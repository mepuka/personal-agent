version: 1
name: compaction-workflow
description: Trigger post-commit metrics gate and verify durable compaction artifacts/checkpoints.
steps:
  - kind: set
    name: seed-vars
    values:
      channelId: "channel:fixture:compaction:{{uuid}}"

  - kind: request
    name: initialize-channel
    method: POST
    path: "/channels/{{channelId}}/initialize"
    body:
      channelType: CLI
      agentId: agent:bootstrap
    expect:
      status: 200
      jsonEquals:
        ok: true

  - kind: repeat
    name: build-chat-history
    times: 18
    step:
      kind: request
      name: seed-turn
      method: POST
      path: "/channels/{{channelId}}/messages"
      body:
        content: "compaction seed turn {{repeat_iteration}}"
      responseType: sse
      expect:
        status: 200
        sseEventTypesInclude:
          - turn.started
          - turn.completed

  - kind: request
    name: fetch-session-id
    method: GET
    path: "/channels/{{channelId}}/status"
    expect:
      status: 200
      jsonExists:
        - activeSessionId
    capture:
      sessionId: activeSessionId

  - kind: sql
    name: force-metrics-pressure
    query: |
      INSERT INTO session_metrics (
        session_id,
        token_count,
        tool_result_bytes,
        artifact_bytes,
        file_touches,
        last_compaction_at,
        updated_at
      ) VALUES (
        '{{sessionId}}',
        500000,
        0,
        0,
        0,
        NULL,
        CURRENT_TIMESTAMP
      )
      ON CONFLICT(session_id) DO UPDATE SET
        token_count = 500000,
        last_compaction_at = NULL,
        updated_at = CURRENT_TIMESTAMP

  - kind: request
    name: trigger-compaction-turn
    method: POST
    path: "/channels/{{channelId}}/messages"
    body:
      content: "trigger compaction now"
    responseType: sse
    expect:
      status: 200
      sseEventTypesInclude:
        - turn.completed

  - kind: sql
    name: wait-compaction-checkpoint
    query: |
      SELECT COUNT(*) AS checkpointCount
      FROM compaction_checkpoints
      WHERE session_id = '{{sessionId}}'
    expect:
      firstRowNumberAtLeast:
        checkpointCount: 1
    retry:
      timeoutMs: 30000
      intervalMs: 500

  - kind: sql
    name: fetch-compaction-artifact-link
    query: |
      SELECT
        session_artifact_id AS sessionArtifactId,
        artifact_id AS artifactId
      FROM session_artifacts
      WHERE session_id = '{{sessionId}}'
        AND purpose = 'CompactionDetail'
      ORDER BY created_at DESC
      LIMIT 1
    expect:
      rowCount: 1
    capture:
      sessionArtifactId: sessionArtifactId
      compactionArtifactId: artifactId
    retry:
      timeoutMs: 30000
      intervalMs: 500

  - kind: file_exists
    name: compaction-link-file-exists
    path: "{{state_root}}/sessions/{{sessionId}}/artifacts/{{sessionArtifactId}}.link.json"
    retry:
      timeoutMs: 15000
      intervalMs: 500

  - kind: file_exists
    name: transcript-exists
    path: "{{state_root}}/sessions/{{sessionId}}/transcript.md"
    retry:
      timeoutMs: 15000
      intervalMs: 500

  - kind: file_exists
    name: events-log-exists
    path: "{{state_root}}/sessions/{{sessionId}}/events/events.jsonl"
    retry:
      timeoutMs: 15000
      intervalMs: 500
